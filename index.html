    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%);
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      @media (prefers-color-scheme: dark) {
        #app-splash {
          background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .splash-brand {
          color: #f1f5f9 !important;
        }
        .splash-tagline {
          color: #94a3b8 !important;
        }
      }
      #app-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-logo {
        width: 80px;
        height: 80px;
        border-radius: 22px;
        box-shadow: 0 20px 40px rgba(8, 145, 178, 0.35);
        margin-bottom: 24px;
        overflow: hidden;
        animation: splash-pulse 1.8s ease-in-out infinite;
        mix-blend-mode: multiply;
      }
      @media (prefers-color-scheme: dark) {
        .splash-logo {
          filter: invert(1);
          mix-blend-mode: normal;
        }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%       { transform: scale(1.1); opacity: 0.85; }
      }
      .splash-brand {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 26px;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }
      .splash-brand span {
        background: linear-gradient(90deg, #0891b2, #2563eb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .splash-tagline {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #64748b;
        letter-spacing: 0.3px;
      }
      .splash-dots {
        display: flex;
        gap: 6px;
        margin-top: 32px;
      }
      .splash-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #0891b2;
        animation: dot-pulse 1.2s ease-in-out infinite;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot-pulse {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40%            { transform: scale(1);   opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen shown until React mounts -->
    <div id="app-splash">
      <div class="splash-logo">
        <img src="https://media.base44.com/images/public/699f775333a30acfe3b73c4e/a189521e3_DynamicBlueSwooshwithCohesiveTypography9.jpg" alt="BwanguSpares" style="width:80px;height:80px;border-radius:22px;object-fit:cover;" />
      </div>
      <div class="splash-brand">Bwangu<span>Spares</span></div>
      <div class="splash-tagline">Zambia's Auto Spares Marketplace</div>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React has rendered (root has children)
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const splash = document.getElementById('app-splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 450);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
